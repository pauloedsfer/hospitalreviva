    background:var(--primary-dark);
    color:#EFEAE0;
    display:flex;flex-direction:column;
    padding:28px 0 20px;
  }
  .brand{padding:0 24px 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:14px;display:flex;align-items:center;gap:12px;}
  .brand-logo{
    width:44px;height:44px;border-radius:10px;background:#fff;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.15);
  }
  .brand-logo img{width:100%;height:100%;object-fit:contain;}
  .brand-logo .fallback{
    font-family:'Fraunces',serif;font-weight:600;font-size:18px;color:var(--primary-dark);
  }
  .brand-text{min-width:0;}
  .brand-mark{
    font-family:'Fraunces',serif;font-size:17.5px;font-weight:600;color:#fff;letter-spacing:.2px;
    line-height:1.2;
  }
  .brand-sub{font-size:10.5px;color:#B9C9C4;margin-top:3px;letter-spacing:.3px;text-transform:uppercase;line-height:1.3;}
  nav{flex:1;padding:6px 12px;}
  .nav-group-label{
    font-size:10.5px;text-transform:uppercase;letter-spacing:.8px;color:#7FA39B;
    padding:16px 12px 6px;font-weight:600;
  }
  .nav-item{
    display:flex;align-items:center;gap:10px;
    padding:9px 12px;border-radius:8px;cursor:pointer;
    color:#D9E4E1;font-size:13.8px;font-weight:500;
    transition:background .12s ease;
  }
  .nav-item:hover{background:rgba(255,255,255,.06);}
  .nav-item.active{background:rgba(255,255,255,.12);color:#fff;}
  .nav-dot{width:6px;height:6px;border-radius:50%;background:#5C8B83;flex-shrink:0;}
  .nav-item.active .nav-dot{background:var(--accent);}
  .sidebar-foot{padding:16px 24px 0;border-top:1px solid rgba(255,255,255,.1);margin-top:10px;}
  .sidebar-foot-name{font-size:12.5px;color:#EFEAE0;font-weight:600;}
  .sidebar-foot-role{font-size:11px;color:#9FB5B0;margin-top:2px;}

  /* ---------- Main ---------- */
  .main{flex:1;min-width:0;padding:32px 40px 60px;}
  .topbar{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:10px;}
  .page-title{font-family:'Fraunces',serif;font-size:26px;font-weight:600;color:var(--ink);max-width:760px;line-height:1.25;}
  .page-title.long{font-size:20px;}
  .page-sub{color:var(--muted);font-size:13px;margin-top:3px;}
  .badge-proto{
    font-size:11px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
    color:var(--accent);background:var(--accent-tint);border:1px solid #E3D2BC;
    padding:4px 10px;border-radius:100px;
  }

  .grid{display:grid;gap:16px;}
  .cards{grid-template-columns:repeat(auto-fit,minmax(190px,1fr));margin-bottom:26px;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    padding:18px 18px 16px;box-shadow:var(--shadow);
  }
  .card-label{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;font-weight:600;}
  .card-value{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:600;margin-top:6px;color:var(--primary-dark);}
  .card-note{font-size:12px;color:var(--muted);margin-top:4px;}
  .card-value.warn{color:var(--warn);}

  .panel{
    background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);
    box-shadow:var(--shadow);margin-bottom:22px;overflow:hidden;
  }
  .panel-head{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 20px;border-bottom:1px solid var(--line);
  }
  .panel-title{font-family:'Fraunces',serif;font-size:16.5px;font-weight:600;}
  .panel-title-sub{font-size:12px;color:var(--muted);margin-top:2px;font-family:'Public Sans',sans-serif;font-weight:400;}
  .panel-body{padding:6px 20px 18px;}

  table{width:100%;border-collapse:collapse;font-size:13.3px;}
  th{
    text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.4px;
    color:var(--muted);font-weight:600;padding:10px 10px;border-bottom:1px solid var(--line);
  }
  td{padding:11px 10px;border-bottom:1px solid #EDEAE0;vertical-align:middle;}
  tr:last-child td{border-bottom:none;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .num{text-align:right;font-family:'IBM Plex Mono',monospace;}

  .tag{
    display:inline-block;font-size:10.5px;font-weight:700;letter-spacing:.3px;
    padding:2.5px 7px;border-radius:5px;color:#fff;
  }
  .tag-a{background:var(--lista-a);}
  .tag-b{background:var(--lista-b);}
  .tag-c{background:var(--lista-c);}
  .tag-out{background:var(--warn-tint);color:var(--warn);}
  .tag-in{background:var(--success-tint);color:var(--success);}

  .pill{
    display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;
    padding:3px 9px;border-radius:100px;background:var(--success-tint);color:var(--success);
  }
  .pill.low{background:var(--warn-tint);color:var(--warn);}

  .btn{
    font-family:'Public Sans',sans-serif;font-size:13px;font-weight:600;
    background:var(--primary);color:#fff;border:none;border-radius:7px;
    padding:9px 15px;cursor:pointer;transition:background .12s ease;
  }
  .btn:hover{background:var(--primary-dark);}
  .btn.ghost{background:transparent;color:var(--primary-dark);border:1px solid var(--line);}
  .btn.ghost:hover{background:var(--primary-tint);}
  .btn.sm{padding:6px 11px;font-size:12px;}

  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
  select,input[type=text],input[type=date],input[type=number]{
    font-family:'Public Sans',sans-serif;font-size:13px;padding:7px 10px;
    border:1px solid var(--line);border-radius:7px;background:#fff;color:var(--ink);
  }

  .view{display:none;}
  .view.active{display:block;}

  .kit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
  .kit-card{border:1px solid var(--line);border-radius:var(--radius);padding:14px 16px;background:#FCFBF8;}
  .kit-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
  .kit-patient{font-weight:700;font-size:14px;}
  .kit-bed{font-size:11.5px;color:var(--muted);font-family:'IBM Plex Mono',monospace;}
  .kit-slot{font-size:11px;text-transform:uppercase;letter-spacing:.4px;color:var(--accent);font-weight:700;margin:10px 0 5px;}
  .kit-item{display:flex;justify-content:space-between;font-size:13px;padding:4px 0;border-bottom:1px dashed #E5E1D5;}
  .kit-item:last-child{border-bottom:none;}
  .check-row{display:flex;gap:8px;margin-top:12px;font-size:11.5px;color:var(--muted);}
  .check-chip{border:1px solid var(--line);border-radius:6px;padding:5px 8px;flex:1;text-align:center;}

  .folio{
    font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);
    background:var(--accent-tint);border:1px solid #E3D2BC;padding:1px 6px;border-radius:5px;
  }

  .note-box{
    background:var(--primary-tint);border:1px solid #C9DEDA;border-radius:8px;
    padding:12px 14px;font-size:12.8px;color:var(--primary-dark);line-height:1.55;margin-bottom:18px;
  }
  .note-box b{color:var(--primary-dark);}

  .foot-signoff{
    margin-top:8px;padding-top:14px;border-top:1px solid var(--line);
    font-size:11.5px;color:var(--muted);display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px;
  }

  .phase{
    display:flex;gap:16px;border:1px solid var(--line);border-radius:var(--radius);
    background:var(--surface);box-shadow:var(--shadow);padding:18px 20px;margin-bottom:14px;
  }
  .phase-num{
    font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--primary);
    width:38px;flex-shrink:0;
  }
  .phase-body{flex:1;min-width:0;}
  .phase-head{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:6px;}
  .phase-title{font-family:'Fraunces',serif;font-size:16.5px;font-weight:600;}
  .phase-status{
    font-size:10.5px;font-weight:700;letter-spacing:.4px;text-transform:uppercase;
    padding:3px 9px;border-radius:100px;
  }
  .phase-status.live{background:var(--success-tint);color:var(--success);}
  .phase-status.planned{background:var(--primary-tint);color:var(--primary-dark);}
  .phase-status.review{background:var(--accent-tint);color:var(--accent);}
  .phase-desc{color:var(--ink-soft);font-size:13.3px;line-height:1.55;}
  .phase-note{
    margin-top:8px;font-size:12px;color:var(--muted);background:#F8F6F0;
    border-left:3px solid var(--accent);padding:8px 10px;border-radius:0 6px 6px 0;
  }

  ::-webkit-scrollbar{width:8px;height:8px;}
  ::-webkit-scrollbar-thumb{background:#D5CFC0;border-radius:4px;}

  @media (max-width:820px){
    .sidebar{width:72px;}
    .brand-sub, .nav-item span.label, .nav-group-label, .sidebar-foot{display:none;}
    .main{padding:22px 16px;}
  }
</style>
</head>

const $ = (sel, el=document) => el.querySelector(sel);
const subById = id => substances.find(s => s.id === id);
const patById = id => patients.find(p => p.id === id);
const fmtDate = d => { const [y,m,dd]=d.split('-'); return `${dd}/${m}/${y}`; };

function saldo(subId){
  const s = subById(subId);
  let bal = s.estoqueInicial;
  movements.filter(m=>m.subId===subId).forEach(m=>{
    bal += m.tipo==='entrada' ? m.qtd : -m.qtd;
  });
  return bal;
}

function listaTagClass(lista){
  if(lista==='A') return 'tag-a';
  if(lista.startsWith('B')) return 'tag-b';
  if(lista.startsWith('C')) return 'tag-c';
  return '';
}

/* ---------------- nav render ---------------- */
function renderNav(){
  const nav = $('#nav');
  nav.innerHTML = NAV.map(group => `
    <div class="nav-group-label">${group.group}</div>
    ${group.items.map(it => `
      <div class="nav-item" data-view="${it.id}">
        <span class="nav-dot"></span><span class="label">${it.label}</span>
      </div>
    `).join('')}
  `).join('');
  nav.querySelectorAll('.nav-item').forEach(el=>{
    el.addEventListener('click', ()=> switchView(el.dataset.view));
  });
}

const TITLES = {
  dashboard: ["Sistema de Controle de Estoque e Escrituração de Medicamentos da Farmácia Hospitalar", "Visão geral da farmácia e da ocupação"],
  pacientes: ["Pacientes", "Cadastro ativo — capacidade e ocupação atual"],
  dose: ["Dose Unitária — hoje", "Kits de dose por paciente e horário, prontos para dupla checagem"],
  estoque: ["Substâncias & Estoque", "Saldo atual calculado a partir das movimentações"],
  prescricoes: ["Prescrições ativas", "Base para a montagem diária da dose unitária"],
  escrituracao: ["Livro de Registro", "Todas as movimentações — fonte única de verdade do estoque"],
  balanco: ["Balanço Mensal (BMPO)", "Estoque inicial, entradas, saídas e saldo final por substância"],
  roadmap: ["Evoluções futuras", "Possibilidades de expansão do sistema em próximas fases"],
};

function switchView(id){
  document.querySelectorAll('.nav-item').forEach(el=> el.classList.toggle('active', el.dataset.view===id));
  document.querySelectorAll('.view').forEach(el=> el.classList.toggle('active', el.id==='view-'+id));
  const titleEl = $('#pageTitle');
  titleEl.textContent = TITLES[id][0];
  titleEl.classList.toggle('long', TITLES[id][0].length > 40);
  $('#pageSub').textContent = TITLES[id][1];
}

/* ---------------- views ---------------- */
function viewDashboard(){
  const totalSaidas = movements.filter(m=>m.tipo==='saida' && m.data==='2026-07-14').length;
  const baixos = substances.filter(s=> saldo(s.id) <= 10).length;
  return `
    <div class="note-box"><b>Ambiente de demonstração.</b> Os dados abaixo são fictícios, montados apenas para ilustrar como o sistema organiza pacientes, estoque de controlados e escrituração num único fluxo — sem planilhas soltas.</div>
    <div class="grid cards">
      <div class="card"><div class="card-label">Ocupação</div><div class="card-value">${patients.length}<span style="font-size:16px;color:var(--muted)"> / ${CAPACIDADE_TOTAL}</span></div><div class="card-note">pacientes ativos hoje</div></div>
      <div class="card"><div class="card-label">Substâncias controladas</div><div class="card-value">${substances.filter(s=>s.lista!=='—').length}</div><div class="card-note">cadastradas (Listas B e C1)</div></div>
      <div class="card"><div class="card-label">Doses dispensadas hoje</div><div class="card-value">${totalSaidas}</div><div class="card-note">registradas no livro de movimentação</div></div>
      <div class="card"><div class="card-label ${baixos?'':''}">Alertas de estoque</div><div class="card-value ${baixos?'warn':''}">${baixos}</div><div class="card-note">substância(s) abaixo do mínimo</div></div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Últimas movimentações</div><div class="panel-title-sub">Entradas e saídas mais recentes do Livro de Registro</div></div>
        <button class="btn ghost sm" data-goto="escrituracao">Ver livro completo</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Data</th><th>Folio</th><th>Tipo</th><th>Substância</th><th>Qtd.</th><th>Referência</th></tr></thead>
          <tbody>
            ${movements.slice().reverse().slice(0,6).map(m=>`
              <tr>
                <td class="mono">${fmtDate(m.data)}</td>
                <td><span class="folio">${m.id}</span></td>
                <td>${m.tipo==='entrada' ? '<span class="tag tag-in">ENTRADA</span>' : '<span class="tag tag-out">SAÍDA</span>'}</td>
                <td>${subById(m.subId).nome}</td>
                <td class="num">${m.tipo==='entrada'?'+':'−'}${m.qtd}</td>
                <td style="color:var(--muted)">${m.ref}${m.paciente? ' · '+patById(m.paciente).nome : ''}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function viewPacientes(){
  return `
    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Pacientes ativos</div><div class="panel-title-sub">${patients.length} de ${CAPACIDADE_TOTAL} leitos ocupados</div></div>
        <button class="btn sm">+ Novo paciente</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Paciente</th><th>Leito</th><th>Admissão</th><th>Prescritor</th><th>Prescrições ativas</th></tr></thead>
          <tbody>
            ${patients.map(p=>{
              const n = prescriptions.filter(pr=>pr.paciente===p.id).length;
              return `<tr>
                <td><b>${p.nome}</b></td>
                <td class="mono">${p.leito}</td>
                <td class="mono">${fmtDate(p.admissao)}</td>
                <td style="color:var(--muted)">${p.prescritor}</td>
                <td>${n}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
    <div class="note-box">Nomes exibidos de forma abreviada neste protótipo por padrão de privacidade — no sistema real, o cadastro completo (nome, CPF, prontuário) fica restrito ao acesso da farmácia e da equipe assistencial.</div>
  `;
}

function viewEstoque(){
  return `
    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Substâncias controladas e estoque</div><div class="panel-title-sub">Saldo = estoque inicial + entradas − saídas (calculado, não digitado)</div></div>
        <button class="btn sm">+ Nova substância</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Substância</th><th>Lista</th><th>Unidade</th><th>Saldo atual</th><th>Situação</th></tr></thead>
          <tbody>
            ${substances.map(s=>{
              const bal = saldo(s.id);
              const low = bal <= 10;
              return `<tr>
                <td><b>${s.nome}</b></td>
                <td>${s.lista==='—' ? '<span style="color:var(--muted)">não controlado</span>' : `<span class="tag ${listaTagClass(s.lista)}">Lista ${s.lista}</span>`}</td>
                <td>${s.unidade}</td>
                <td class="num mono">${bal}</td>
                <td>${low ? '<span class="pill low">● abaixo do mínimo</span>' : '<span class="pill">● regular</span>'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function viewPrescricoes(){
  return `
    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Mapa de prescrição diária</div><div class="panel-title-sub">Base médica que alimenta a montagem da dose unitária</div></div>
        <button class="btn sm">+ Nova prescrição</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Paciente</th><th>Substância</th><th>Dose</th><th>Via</th><th>Horários</th></tr></thead>
          <tbody>
            ${prescriptions.map(pr=>`
              <tr>
                <td><b>${patById(pr.paciente).nome}</b> <span style="color:var(--muted)">· ${patById(pr.paciente).leito}</span></td>
                <td>${subById(pr.subId).nome}</td>
                <td>${pr.dose}</td>
                <td class="mono">${pr.via}</td>
                <td>${pr.horarios.map(h=>`<span class="tag" style="background:var(--primary-tint);color:var(--primary-dark)">${h}</span>`).join(' ')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function viewDose(){
  const slots = ["08h","22h"];
  const cards = patients.map(p=>{
    const pres = prescriptions.filter(pr=>pr.paciente===p.id);
    if(!pres.length) return '';
    const slotsHtml = slots.map(slot=>{
      const items = pres.filter(pr=>pr.horarios.includes(slot));
      if(!items.length) return '';
      return `
        <div class="kit-slot">${slot}</div>
        ${items.map(it=>`<div class="kit-item"><span>${subById(it.subId).nome}</span><span class="mono">${it.dose}</span></div>`).join('')}
      `;
    }).join('');
    return `
      <div class="kit-card">
        <div class="kit-head">
          <div><div class="kit-patient">${p.nome}</div><div class="kit-bed">${p.leito}</div></div>
        </div>
        ${slotsHtml}
        <div class="check-row">
          <div class="check-chip">☐ Preparo</div>
          <div class="check-chip">☐ Dupla checagem</div>
          <div class="check-chip">☐ Administrado</div>
        </div>
      </div>
    `;
  }).join('');
  return `
    <div class="note-box"><b>Fluxo do dia — ${fmtDate('2026-07-14')}.</b> Cada card é o kit de dose unitária de um paciente, gerado automaticamente a partir do mapa de prescrição. A dupla checagem (farmácia + enfermagem) fica registrada aqui antes da liberação.</div>
    <div class="kit-grid">${cards}</div>
  `;
}

function viewEscrituracao(){
  return `
    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Livro de Registro Específico</div><div class="panel-title-sub">Toda entrada e saída de substâncias controladas, com folio sequencial</div></div>
        <div class="toolbar">
          <select><option>Todas as substâncias</option>${substances.map(s=>`<option>${s.nome}</option>`).join('')}</select>
          <button class="btn ghost sm">Exportar PDF</button>
          <button class="btn sm">+ Novo lançamento</button>
        </div>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Folio</th><th>Data</th><th>Tipo</th><th>Substância</th><th>Qtd.</th><th>Paciente / Referência</th><th>Saldo após</th></tr></thead>
          <tbody>
            ${(()=>{
              const running = {};
              substances.forEach(s=> running[s.id] = s.estoqueInicial);
              return movements.map(m=>{
                running[m.subId] += m.tipo==='entrada'? m.qtd : -m.qtd;
                return `<tr>
                  <td><span class="folio">${m.id}</span></td>
                  <td class="mono">${fmtDate(m.data)}</td>
                  <td>${m.tipo==='entrada' ? '<span class="tag tag-in">ENTRADA</span>' : '<span class="tag tag-out">SAÍDA</span>'}</td>
                  <td>${subById(m.subId).nome}</td>
                  <td class="num mono">${m.tipo==='entrada'?'+':'−'}${m.qtd}</td>
                  <td style="color:var(--muted)">${m.paciente ? patById(m.paciente).nome+' · ' : ''}${m.ref}</td>
                  <td class="num mono"><b>${running[m.subId]}</b></td>
                </tr>`;
              }).join('');
            })()}
          </tbody>
        </table>
        <div class="foot-signoff">
          <span>Responsável técnico: Paulo Edson Fernandes — CRF-GO 9303</span>
          <span>Escrituração gerada automaticamente a partir das movimentações — sem digitação manual de saldo</span>
        </div>
      </div>
    </div>
  `;
}

function viewBalanco(){
  return `
    <div class="panel">
      <div class="panel-head">
        <div><div class="panel-title">Balanço Mensal de Psicotrópicos e Entorpecentes</div><div class="panel-title-sub">Referência: julho / 2026 — gerado a partir do Livro de Registro</div></div>
        <button class="btn ghost sm">Exportar BMPO</button>
      </div>
      <div class="panel-body">
        <table>
          <thead><tr><th>Substância</th><th>Lista</th><th>Estoque inicial</th><th>Entradas</th><th>Saídas</th><th>Saldo final</th></tr></thead>
          <tbody>
            ${substances.filter(s=>s.lista!=='—').map(s=>{
              const entradas = movements.filter(m=>m.subId===s.id && m.tipo==='entrada').reduce((a,m)=>a+m.qtd,0);
              const saidas = movements.filter(m=>m.subId===s.id && m.tipo==='saida').reduce((a,m)=>a+m.qtd,0);
              return `<tr>
                <td><b>${s.nome}</b></td>
                <td><span class="tag ${listaTagClass(s.lista)}">Lista ${s.lista}</span></td>
                <td class="num mono">${s.estoqueInicial}</td>
                <td class="num mono">+${entradas}</td>
                <td class="num mono">−${saidas}</td>
                <td class="num mono"><b>${s.estoqueInicial + entradas - saidas}</b></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
        <div class="foot-signoff">
          <span>Pronto para assinatura digital e envio à Vigilância Sanitária</span>
          <span>Farmacêutico RT: Paulo Edson Fernandes — CRF-GO 9303</span>
        </div>
      </div>
    </div>
  `;
}

function viewRoadmap(){
  const phases = [
    {
      n: "1", status: "live", statusLabel: "Neste protótipo",
      title: "Escrituração digital e Dose Unitária",
      desc: "Cadastro de pacientes, substâncias e prescrições; kits de dose unitária gerados por paciente/horário; Livro de Registro e Balanço Mensal calculados automaticamente a partir das movimentações — uso individual, em um único computador ou tablet da farmácia.",
    },
    {
      n: "2", status: "planned", statusLabel: "Planejado",
      title: "Login e controle de acesso por perfil",
      desc: "Cada integrante da equipe (farmácia, enfermagem, administração) passa a ter usuário e senha próprios, com permissões conforme a função. Toda ação — lançamento, checagem, alteração — fica registrada com autor e horário, criando trilha de auditoria.",
    },
    {
      n: "3", status: "planned", statusLabel: "Planejado",
      title: "Dados em rede — acesso simultâneo da equipe",
      desc: "O sistema passa a ficar hospedado em nuvem, acessível de vários dispositivos ao mesmo tempo. A farmácia, a enfermagem e a direção enxergam a mesma informação em tempo real, sem planilhas paralelas ou versões desatualizadas.",
      note: "Tecnicamente, isso muda a arquitetura do sistema: hoje ele roda localmente; para múltiplos usuários simultâneos, passa a depender de um banco de dados em nuvem. É um passo natural, mas com esforço de implementação maior que as fases 1 e 2.",
    },
    {
      n: "4", status: "review", statusLabel: "Em avaliação técnica/jurídica",
      title: "Prescrição médica eletrônica integrada",
      desc: "O médico prescreve diretamente no sistema, alimentando automaticamente o mapa de dose unitária — eliminando a transcrição manual da prescrição para a farmácia.",
      note: "Como funcionalidade interna (prescrição digital dentro do sistema do hospital), é totalmente viável. Para que tenha o mesmo valor legal de uma receita física assinada, o ideal é avaliar com a direção o uso de assinatura eletrônica qualificada (certificado ICP-Brasil) — é um ponto técnico-jurídico a definir junto à instituição, não uma limitação do sistema em si.",
    },
  ];
  return `
    <div class="note-box"><b>Como ler este roadmap.</b> A Fase 1 é o que você já está vendo funcionando neste protótipo. As fases seguintes são direções realistas de evolução, priorizadas conforme a necessidade da equipe — não promessas de prazo fechado, mas o caminho técnico já está mapeado.</div>
    ${phases.map(p=>`
      <div class="phase">
        <div class="phase-num">${p.n}</div>
        <div class="phase-body">
          <div class="phase-head">
            <div class="phase-title">${p.title}</div>
            <span class="phase-status ${p.status}">${p.statusLabel}</span>
          </div>
          <div class="phase-desc">${p.desc}</div>
          ${p.note ? `<div class="phase-note">${p.note}</div>` : ''}
        </div>
      </div>
    `).join('')}
  `;
}


function mount(){
  const vp = $('#viewport');
  vp.innerHTML = `
    <div class="view active" id="view-dashboard">${viewDashboard()}</div>
    <div class="view" id="view-pacientes">${viewPacientes()}</div>
    <div class="view" id="view-dose">${viewDose()}</div>
    <div class="view" id="view-estoque">${viewEstoque()}</div>
    <div class="view" id="view-prescricoes">${viewPrescricoes()}</div>
    <div class="view" id="view-escrituracao">${viewEscrituracao()}</div>
    <div class="view" id="view-balanco">${viewBalanco()}</div>
    <div class="view" id="view-roadmap">${viewRoadmap()}</div>
  `;
  vp.querySelectorAll('[data-goto]').forEach(el=>{
    el.addEventListener('click', ()=> switchView(el.dataset.goto));
  });
}

renderNav();
mount();
switchView('dashboard');
document.querySelector('.nav-item[data-view="dashboard"]').classList.add('active');
</script>
</body>
</html>
